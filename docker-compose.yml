services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: events_postgres
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_password
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dbSetup.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Service
  api:
    build: .
    container_name: events_api
    command: ["node", "server.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY}
      SETLISTFM_API_KEY: ${SETLISTFM_API_KEY}
      SCRAPE_ENABLED: ${SCRAPE_ENABLED:-true}
      SCRAPE_SOURCE_URLS: ${SCRAPE_SOURCE_URLS:-}
      SCRAPE_MAX_EVENTS: ${SCRAPE_MAX_EVENTS:-40}
      SCRAPE_MAX_EVENTS_PER_SOURCE: ${SCRAPE_MAX_EVENTS_PER_SOURCE:-25}
      SCRAPE_MAX_LINKS_PER_SOURCE: ${SCRAPE_MAX_LINKS_PER_SOURCE:-20}
      SCRAPE_TIMEOUT_MS: ${SCRAPE_TIMEOUT_MS:-12000}
      SCRAPE_SOURCE_CONCURRENCY: ${SCRAPE_SOURCE_CONCURRENCY:-3}
      SCRAPE_CACHE_TTL_MS: ${SCRAPE_CACHE_TTL_MS:-900000}
      SCRAPE_REQUEST_WAIT_MS: ${SCRAPE_REQUEST_WAIT_MS:-2500}
      SCRAPE_USER_AGENT: ${SCRAPE_USER_AGENT:-EventifyScraper/1.0}
      SCRAPE_ALLOWED_COUNTRIES: ${SCRAPE_ALLOWED_COUNTRIES:-}
      SCRAPE_ALLOWED_CITIES: ${SCRAPE_ALLOWED_CITIES:-}
      SCRAPE_SONGKICK_OFFICIAL_LOOKUP: ${SCRAPE_SONGKICK_OFFICIAL_LOOKUP:-true}
      SCRAPE_SONGKICK_OFFICIAL_ENRICH_LIMIT: ${SCRAPE_SONGKICK_OFFICIAL_ENRICH_LIMIT:-12}
      SCRAPE_SONGKICK_TICKET_TIMEOUT_MS: ${SCRAPE_SONGKICK_TICKET_TIMEOUT_MS:-10000}
      SCRAPE_OFFICIAL_PAGE_TIMEOUT_MS: ${SCRAPE_OFFICIAL_PAGE_TIMEOUT_MS:-10000}
      SCRAPE_ENABLE_OFFICIAL_PAGE_ENRICHMENT: ${SCRAPE_ENABLE_OFFICIAL_PAGE_ENRICHMENT:-true}
      SCRAPE_EVENTBRITE_DETAIL_LOOKUP: ${SCRAPE_EVENTBRITE_DETAIL_LOOKUP:-true}
      SCRAPE_EVENTBRITE_DETAIL_ENRICH_LIMIT: ${SCRAPE_EVENTBRITE_DETAIL_ENRICH_LIMIT:-8}
      SCRAPE_EVENTBRITE_DETAIL_TIMEOUT_MS: ${SCRAPE_EVENTBRITE_DETAIL_TIMEOUT_MS:-10000}
      PRICE_ENRICH_ENABLED: ${PRICE_ENRICH_ENABLED:-true}
      PRICE_ENRICH_MAX_PER_REQUEST: ${PRICE_ENRICH_MAX_PER_REQUEST:-12}
      PRICE_ENRICH_TICKETMASTER_MAX_PER_REQUEST: ${PRICE_ENRICH_TICKETMASTER_MAX_PER_REQUEST:-12}
      PRICE_ENRICH_CONCURRENCY: ${PRICE_ENRICH_CONCURRENCY:-4}
      PRICE_ENRICH_TIMEOUT_MS: ${PRICE_ENRICH_TIMEOUT_MS:-4500}
      PRICE_ENRICH_USER_AGENT: ${PRICE_ENRICH_USER_AGENT:-Mozilla/5.0}
      PRICE_ENRICH_BACKGROUND_ENABLED: ${PRICE_ENRICH_BACKGROUND_ENABLED:-true}
      PRICE_ENRICH_BACKGROUND_DELAY_MS: ${PRICE_ENRICH_BACKGROUND_DELAY_MS:-2000}
      PRICE_ENRICH_BACKGROUND_MAX_QUEUE: ${PRICE_ENRICH_BACKGROUND_MAX_QUEUE:-250}
      PRICE_ENRICH_CACHE_TTL_MS: ${PRICE_ENRICH_CACHE_TTL_MS:-21600000}
      PRICE_ENRICH_BLOCK_TTL_MS: ${PRICE_ENRICH_BLOCK_TTL_MS:-600000}
      TICKETMASTER_PRICE_INFERENCE_ENABLED: ${TICKETMASTER_PRICE_INFERENCE_ENABLED:-true}
      TICKETMASTER_PRICE_INFERENCE_MAX_SAMPLES_PER_KEY: ${TICKETMASTER_PRICE_INFERENCE_MAX_SAMPLES_PER_KEY:-24}
      TICKETMASTER_PRICE_INFERENCE_MAX_KEYS_PER_BUCKET: ${TICKETMASTER_PRICE_INFERENCE_MAX_KEYS_PER_BUCKET:-600}
      TICKETMASTER_PRICE_INFERENCE_MIN_TITLE_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_TITLE_SAMPLES:-2}
      TICKETMASTER_PRICE_INFERENCE_MIN_ARTIST_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_ARTIST_SAMPLES:-2}
      TICKETMASTER_PRICE_INFERENCE_MIN_VENUE_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_VENUE_SAMPLES:-2}
      TICKETMASTER_PRICE_INFERENCE_MIN_PROMOTER_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_PROMOTER_SAMPLES:-2}
      TICKETMASTER_PRICE_INFERENCE_MIN_CITY_CATEGORY_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_CITY_CATEGORY_SAMPLES:-3}
      TICKETMASTER_PRICE_INFERENCE_MIN_CATEGORY_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_CATEGORY_SAMPLES:-4}
      TICKETMASTER_PRICE_INFERENCE_MIN_CITY_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_CITY_SAMPLES:-4}
      TICKETMASTER_PRICE_INFERENCE_MIN_GLOBAL_SAMPLES: ${TICKETMASTER_PRICE_INFERENCE_MIN_GLOBAL_SAMPLES:-6}
      TICKETMASTER_PRICE_INFERENCE_STRICT_MODE: ${TICKETMASTER_PRICE_INFERENCE_STRICT_MODE:-true}
      TICKETMASTER_PRICE_INFERENCE_MAX_SPREAD_RATIO: ${TICKETMASTER_PRICE_INFERENCE_MAX_SPREAD_RATIO:-1.8}
      TICKETMASTER_PRICE_INFERENCE_ALLOW_BROAD_BUCKETS: ${TICKETMASTER_PRICE_INFERENCE_ALLOW_BROAD_BUCKETS:-false}
      TICKETMASTER_PRICE_INFERENCE_ALLOW_GLOBAL_BUCKET: ${TICKETMASTER_PRICE_INFERENCE_ALLOW_GLOBAL_BUCKET:-false}
      TICKETMASTER_PRICE_INFERENCE_DB_SEED_ENABLED: ${TICKETMASTER_PRICE_INFERENCE_DB_SEED_ENABLED:-true}
      TICKETMASTER_PRICE_INFERENCE_DB_SEED_TTL_MS: ${TICKETMASTER_PRICE_INFERENCE_DB_SEED_TTL_MS:-600000}
      TICKETMASTER_PRICE_INFERENCE_DB_SEED_MAX_ROWS: ${TICKETMASTER_PRICE_INFERENCE_DB_SEED_MAX_ROWS:-3000}
      DATABASE_URL: postgres://events_user:events_password@postgres:5432/events_db
      DATABASE_SSL: ${DATABASE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-dev_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_LOCALHOST_ANY_PORT: ${CORS_ALLOW_LOCALHOST_ANY_PORT:-false}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-90000}
      OLLAMA_MAX_MESSAGE_CHARS: ${OLLAMA_MAX_MESSAGE_CHARS:-1200}
      CHATBOT_OLLAMA_ONLY: ${CHATBOT_OLLAMA_ONLY:-true}
      CHATBOT_OLLAMA_TIMEOUT_MS: ${CHATBOT_OLLAMA_TIMEOUT_MS:-12000}
      CHATBOT_OLLAMA_CACHE_TTL_MS: ${CHATBOT_OLLAMA_CACHE_TTL_MS:-120000}
      CHATBOT_OLLAMA_MAX_REPLY_CHARS: ${CHATBOT_OLLAMA_MAX_REPLY_CHARS:-1400}
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_HOST_PORT:-3000}:3000"

  # Sync Service
  sync:
    build: .
    container_name: events_sync
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://events_user:events_password@postgres:5432/events_db
      DATABASE_SSL: ${DATABASE_SSL:-false}
      API_BASE_URL: http://api:3000
      SYNC_INTERVAL: ${SYNC_INTERVAL:-0 * * * *}
      DEFAULT_LAT: ${DEFAULT_LAT:-50.8503}
      DEFAULT_LNG: ${DEFAULT_LNG:-4.3517}
      DEFAULT_RADIUS_KM: ${DEFAULT_RADIUS_KM:-50}
      FETCH_SIZE: ${FETCH_SIZE:-50}
      SYNC_USER_ID: ${SYNC_USER_ID:-1}
      NODE_ENV: production
    # For one-time sync, uncomment:
    # command: ["node", "sync.js", "--once"]

volumes:
  postgres_data:
