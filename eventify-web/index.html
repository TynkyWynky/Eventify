<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Discover local concerts and events with smart filters, social insights, and personalized recommendations on Eventium." />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Eventium" />
  <meta property="og:title" content="Eventium | Discover Local Concerts & Events" />
  <meta property="og:description" content="Discover local concerts and events with smart filters, social insights, and personalized recommendations on Eventium." />
  <meta property="og:image" content="/Eventify_Logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Eventium | Discover Local Concerts & Events" />
  <meta name="twitter:description" content="Discover local concerts and events with smart filters, social insights, and personalized recommendations on Eventium." />
  <meta name="twitter:image" content="/Eventify_Logo.png" />
  <link rel="canonical" href="https://eventium.be/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jaini+Purva&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/Eventify_Logo.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="theme-color" content="#b26aa8" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Eventium",
      "url": "https://eventium.be/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://eventium.be/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Eventium",
      "url": "https://eventium.be/",
      "logo": "https://eventium.be/Eventify_Logo.png"
    }
  </script>
  <title>Eventium</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main/main.tsx"></script>
</body>

</html>
